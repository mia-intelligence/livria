<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LIVRIAL — Connexion</title>
  <link rel="icon" href="/images/atrial-logo.jpeg" type="image/jpeg">
  <link rel="apple-touch-icon" href="/images/atrial-logo.jpeg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4BBFBF">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="/images/atrial-logo.jpeg" alt="Atrial">
      <div>
        <div class="app-title">LIVR<span>I</span>AL</div>
        <div class="app-sub">Groupe Atrial · Gestion des tournées</div>
      </div>
    </div>

    <div class="login-error" id="login-error"></div>

    <form id="login-form" autocomplete="on">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="username" placeholder="prenom.nom@atrial.fr" required>
      </div>
      <div class="field">
        <label for="password">Mot de passe</label>
        <div style="position:relative">
          <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required style="width:100%;padding-right:44px">
          <button type="button" onclick="togglePassword()" id="eye-btn"
            style="position:absolute;right:0;top:0;height:100%;width:44px;background:none;border:none;cursor:pointer;color:var(--ink-mute);display:flex;align-items:center;justify-content:center;">
            <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn primary" id="login-btn">Se connecter</button>
    </form>
  </div>
</div>

<script>
function togglePassword() {
  const input = document.getElementById('password');
  const icon  = document.getElementById('eye-icon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
  } else {
    input.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>';
  }
}

const ROLE_REDIRECT = {
  LIVREUR:  '/livreur',
  ADV:      '/adv',
  ADMIN:    '/admin',
  MAGASIN:  '/magasin',
};

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  errEl.classList.remove('visible');
  btn.disabled = true;
  btn.textContent = 'Connexion…';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
      }),
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.error || 'Erreur de connexion';
      errEl.classList.add('visible');
    } else {
      window.location.href = ROLE_REDIRECT[data.role] || '/';
    }
  } catch {
    errEl.textContent = 'Erreur réseau. Vérifiez votre connexion.';
    errEl.classList.add('visible');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Se connecter';
  }
});
</script>
</body>
</html>
