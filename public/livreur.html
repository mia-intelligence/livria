<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>LIVRIAL — Tournée du jour</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: var(--canvas); }

    /* Bouton + dans le header */
    .add-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--turquoise); border: 0; color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      box-shadow: 0 4px 10px var(--turquoise-shadow);
    }

    /* Sheet ajout livraison */
    .add-sheet {
      position: fixed; left: 0; right: 0; bottom: 0;
      background: var(--bg);
      border-radius: 24px 24px 0 0;
      padding: 10px 20px 36px;
      max-height: 92vh; overflow-y: auto;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.2,.7,.2,1);
      z-index: 51;
      box-shadow: 0 -10px 30px rgba(0,0,0,.12);
    }
    .add-sheet.open { transform: translateY(0); }

    .add-sheet h2 { margin: 0; font-size: 18px; font-weight: 800; letter-spacing: -.01em; }
    .add-sheet .sub { font-size: 12.5px; color: var(--ink-soft); margin-top: 4px; margin-bottom: 20px; }

    .add-sheet .field { margin-bottom: 14px; }
    .add-sheet .field label {
      display: block; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .08em;
      color: var(--ink-mute); margin-bottom: 6px;
    }
    .add-sheet .field input {
      width: 100%; height: 46px; border-radius: 12px;
      border: 1px solid var(--line); padding: 0 14px;
      font: inherit; font-size: 14px; color: var(--ink);
      background: var(--bg); outline: none;
    }
    .add-sheet .field input:focus {
      border-color: var(--turquoise);
      box-shadow: 0 0 0 4px rgba(75,191,191,.15);
    }
    .add-sheet .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .add-sheet .hint {
      background: var(--turquoise-soft); border-radius: 12px;
      padding: 10px 12px; font-size: 12px;
      color: var(--turquoise-dark); font-weight: 500;
      display: flex; align-items: flex-start; gap: 8px;
      margin-bottom: 18px;
    }
    .add-sheet .hint svg { flex-shrink: 0; margin-top: 1px; }

    .add-sheet-error {
      background: var(--danger-soft); color: #A14444;
      border-radius: 10px; padding: 10px 14px;
      font-size: 13px; margin-bottom: 14px; display: none;
    }

    .add-actions {
      display: grid; grid-template-columns: 1fr 1.4fr; gap: 10px;
      padding-top: 16px; border-top: 1px solid var(--line);
      margin-top: 6px;
    }
    .add-actions button {
      height: 50px; border-radius: 14px; border: 0;
      font: 700 14px 'Inter', sans-serif; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .add-actions .btn-cancel { background: var(--canvas); color: var(--ink); }
    .add-actions .btn-submit {
      background: var(--turquoise); color: #fff;
      box-shadow: 0 6px 14px var(--turquoise-shadow);
    }
    .add-actions .btn-submit:disabled { opacity: .6; cursor: not-allowed; }

    @media print {
      .map-container, .fab, .add-btn,
      .stop-sheet-overlay, .stop-sheet, .add-sheet { display: none !important; }
      .livreur-layout { max-width: 100%; }
      .stops-list { padding-bottom: 0; overflow: visible; }
      .stop-card { cursor: default; }
      body { background: #fff; }
    }
  </style>
</head>
<body>

<div class="livreur-layout">

  <!-- HEADER -->
  <header class="livreur-header">
    <div class="brand-left">
      <img src="/images/atrial-logo.jpeg" alt="Atrial">
      <div class="brand-meta">
        <div class="role-label">LIVREUR</div>
      </div>
    </div>
    <div class="brand-right" style="display:flex;align-items:center;gap:12px">
      <button class="add-btn" onclick="openAddSheet()" title="Ajouter une livraison">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M12 5v14M5 12h14" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </button>
      <div>
        <div class="app-name">LIVR<span>I</span>AL</div>
        <div class="today-date" id="today-date"></div>
      </div>
    </div>
  </header>

  <!-- SUMMARY STRIP -->
  <div class="summary-strip">
    <div class="sum-item">
      <div class="sum-label">Total</div>
      <div class="sum-value" id="sum-total"><em>—</em></div>
    </div>
    <div class="sum-item">
      <div class="sum-label">Livrés</div>
      <div class="sum-value" id="sum-done"><em>—</em></div>
    </div>
    <div class="sum-item">
      <div class="sum-label">Restants</div>
      <div class="sum-value" id="sum-remaining"><em>—</em></div>
    </div>
  </div>

  <!-- MAP -->
  <div class="map-container">
    <div id="livreur-map"></div>
  </div>

  <!-- STOPS LIST -->
  <div class="stops-list" id="stops-list">
    <div style="text-align:center;padding:40px 20px;color:var(--ink-mute);">
      Chargement de la tournée…
    </div>
  </div>

</div>

<!-- FAB PRINT -->
<button class="fab" onclick="window.print()">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
    <path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
    <rect x="6" y="14" width="12" height="8" rx="1" stroke="currentColor" stroke-width="2"/>
  </svg>
  Imprimer ma fiche
</button>

<!-- STOP DETAIL SHEET -->
<div class="stop-sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
<div class="stop-sheet" id="stop-sheet">
  <div class="sheet-grabber"></div>
  <div class="sheet-title" id="sheet-title"></div>
  <div class="sheet-sub" id="sheet-affaire"></div>

  <div class="sheet-detail-row">
    <div class="label">Adresse</div>
    <div id="sheet-adresse"></div>
  </div>
  <div class="sheet-detail-row">
    <div class="label">Téléphone</div>
    <div id="sheet-tel"></div>
  </div>
  <div class="sheet-detail-row">
    <div class="label">Statut actuel</div>
    <div id="sheet-statut-current"></div>
  </div>

  <div class="status-actions" id="status-actions"></div>
</div>

<!-- ADD LIVRAISON SHEET -->
<div class="stop-sheet-overlay" id="add-overlay" onclick="closeAddSheet()"></div>
<div class="add-sheet" id="add-sheet">
  <div class="sheet-grabber"></div>
  <h2>Ajouter une livraison</h2>
  <div class="sub">Stop imprévu · ajouté à votre tournée</div>

  <div class="hint">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
      <path d="M12 8v4l2 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    Le stop sera ajouté en fin de tournée avec le statut "À livrer".
  </div>

  <div class="add-sheet-error" id="add-error"></div>

  <div class="field">
    <label>Société / Chantier *</label>
    <input type="text" id="add-societe" placeholder="Nom de la société ou du chantier" autocomplete="organization">
  </div>

  <div class="field">
    <label>Adresse de livraison *</label>
    <input type="text" id="add-adresse" placeholder="14 rue de la Pinède, 83000 Toulon" autocomplete="street-address">
  </div>

  <div class="row2">
    <div class="field">
      <label>N° d'affaire</label>
      <input type="text" id="add-affaire" placeholder="2026-XXX">
    </div>
    <div class="field">
      <label>Téléphone</label>
      <input type="tel" id="add-tel" placeholder="06 XX XX XX XX" autocomplete="tel">
    </div>
  </div>

  <div class="add-actions">
    <button class="btn-cancel" onclick="closeAddSheet()">Annuler</button>
    <button class="btn-submit" id="add-submit-btn" onclick="submitAddStop()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
        <path d="M12 5v14M5 12h14" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/>
      </svg>
      Ajouter le stop
    </button>
  </div>
</div>

<script src="/js/livreur.js"></script>
<script>
  function initMap() { window._mapReady = true; if (window._stopsReady) renderMap(window._stops); }
</script>
<script async
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyApoCYXJYojepwgGFi_iLe_I1vkopTNfUY&callback=initMap&loading=async">
</script>
</body>
</html>
