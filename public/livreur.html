<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>LIVRIAL — Tournée du jour</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: var(--canvas); }

    /* FAB zone */
    .fab-zone {
      position: fixed; bottom: 20px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 12px;
      z-index: 20; padding: 0 16px;
    }

    @media print {
      .map-container, .fab-zone,
      .stop-sheet-overlay, .stop-sheet { display: none !important; }
      .livreur-layout { max-width: 100%; }
      .stops-list { padding-bottom: 0; overflow: visible; }
      .stop-card { cursor: default; }
      body { background: #fff; }
    }
  </style>
</head>
<body>

<div class="livreur-layout">

  <!-- HEADER -->
  <header class="livreur-header">
    <div class="brand-left">
      <img src="/images/atrial-logo.jpeg" alt="Atrial">
      <div class="brand-meta">
        <div class="role-label">LIVREUR</div>
      </div>
    </div>
    <div class="brand-right">
      <div class="app-name">LIVR<span>I</span>AL</div>
      <div class="today-date" id="today-date"></div>
    </div>
  </header>

  <!-- SUMMARY STRIP -->
  <div class="summary-strip">
    <div class="sum-item">
      <div class="sum-label">Total</div>
      <div class="sum-value" id="sum-total"><em>—</em></div>
    </div>
    <div class="sum-item">
      <div class="sum-label">Livrés</div>
      <div class="sum-value" id="sum-done"><em>—</em></div>
    </div>
    <div class="sum-item">
      <div class="sum-label">Restants</div>
      <div class="sum-value" id="sum-remaining"><em>—</em></div>
    </div>
  </div>

  <!-- MAP -->
  <div class="map-container">
    <div id="livreur-map"></div>
  </div>

  <!-- STOPS LIST -->
  <div class="stops-list" id="stops-list">
    <div style="text-align:center;padding:40px 20px;color:var(--ink-mute);">
      Chargement de la tournée…
    </div>
  </div>

</div>

<!-- FAB ZONE -->
<div class="fab-zone">
  <button class="fab" id="btn-optimize" style="background:var(--turquoise);color:#fff;box-shadow:0 4px 14px rgba(0,0,0,.15)" onclick="optimizeRoute()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
      <path d="M3 12h18M3 6h18M3 18h18" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
    </svg>
    Optimiser l'itinéraire
  </button>
  <button class="fab" style="background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:0 4px 14px rgba(0,0,0,.1)" onclick="window.print()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
      <path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <rect x="6" y="14" width="12" height="8" rx="1" stroke="currentColor" stroke-width="2"/>
    </svg>
    Imprimer
  </button>
</div>

<!-- STOP DETAIL SHEET -->
<div class="stop-sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
<div class="stop-sheet" id="stop-sheet">
  <div class="sheet-grabber"></div>
  <div class="sheet-title" id="sheet-title"></div>
  <div class="sheet-sub" id="sheet-affaire"></div>

  <div class="sheet-detail-row">
    <div class="label">Adresse</div>
    <div id="sheet-adresse"></div>
  </div>
  <div class="sheet-detail-row">
    <div class="label">Téléphone</div>
    <div id="sheet-tel"></div>
  </div>
  <div class="sheet-detail-row">
    <div class="label">Statut actuel</div>
    <div id="sheet-statut-current"></div>
  </div>

  <!-- Info magasin : colis + emplacement + commentaire -->
  <div id="sheet-magasin-info"></div>

  <!-- Checkbox confirmation colis -->
  <div id="sheet-colis-confirm" style="display:none;margin:14px 0;background:var(--warn-soft);border-radius:12px;padding:12px 14px;">
    <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;font-size:14px;font-weight:600;color:#8A5A12">
      <input type="checkbox" id="cb-colis-confirme" style="width:18px;height:18px;margin-top:1px;flex-shrink:0;accent-color:var(--turquoise)" onchange="onColisCheckChange()">
      <span id="cb-colis-label">J'ai bien pris tous les colis</span>
    </label>
  </div>

  <div class="status-actions" id="status-actions"></div>
</div>

<!-- PHOTO MODAL -->
<div class="stop-sheet-overlay" id="photo-overlay" onclick="closePhotoModal()"></div>
<div class="stop-sheet" id="photo-sheet">
  <div class="sheet-grabber"></div>
  <div class="sheet-title" style="margin-bottom:14px">Photos du colissage</div>
  <img id="photo-img" src="" alt="Photo du colissage"
    style="width:100%;border-radius:12px;display:block;object-fit:contain;max-height:55vh;">
  <!-- Navigation galerie -->
  <div id="photo-nav" style="display:none;justify-content:space-between;align-items:center;margin-top:10px;gap:8px">
    <button id="photo-prev" onclick="photoNavPrev()"
      style="width:44px;height:44px;border-radius:50%;border:1px solid var(--line);background:var(--canvas);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;">‹</button>
    <span id="photo-nav-label" style="font-size:13px;color:var(--ink-mute);font-weight:600"></span>
    <button id="photo-next" onclick="photoNavNext()"
      style="width:44px;height:44px;border-radius:50%;border:1px solid var(--line);background:var(--canvas);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;">›</button>
  </div>
  <div id="photo-notice"
    style="margin-top:8px;font-size:12px;color:var(--ink-mute);text-align:center;"></div>
  <button onclick="closePhotoModal()"
    style="margin-top:14px;width:100%;height:48px;border-radius:12px;border:1px solid var(--line);background:var(--canvas);font:600 14px 'Inter',sans-serif;color:var(--ink);cursor:pointer;">
    Fermer
  </button>
</div>

<script src="/js/livreur.js"></script>
<script>
  function initMap() { window._mapReady = true; if (window._stopsReady) renderMap(window._stops); }
</script>
<script async
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyApoCYXJYojepwgGFi_iLe_I1vkopTNfUY&callback=initMap&loading=async">
</script>
</body>
</html>
